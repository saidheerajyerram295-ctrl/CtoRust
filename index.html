<!DOCTYPE html>
<html>
<head>
<title>C → Rust Converter</title>

<style>
body{
background:#111;
color:#fff;
font-family:Arial;
text-align:center;
}

textarea{
width:45%;
height:400px;
background:#1e1e1e;
color:#00ffcc;
border:1px solid #444;
padding:10px;
font-family:monospace;
margin:10px;
}

button{
padding:12px 25px;
font-size:16px;
background:#00ffc3;
border:none;
cursor:pointer;
}

h1{
color:#00ffc3;
}
</style>
</head>

<body>

<h1>C → Rust Code Converter</h1>

<textarea id="inputCode" placeholder="Paste C code here"></textarea>
<textarea id="outputCode" placeholder="Rust output"></textarea>

<br>
<button onclick="convert()">Convert</button>

<script>

function convert(){

let code = document.getElementById("inputCode").value;

/* LARGE RULE SET */

const rules = [

[/#include <stdio.h>/g,""],
[/#include <stdlib.h>/g,""],
[/#include <string.h>/g,""],
[/printf/g,"println!"],
[/scanf/g,"read_line"],
[/puts/g,"println!"],
[/gets/g,"read_line"],
[/int main/g,"fn main"],
[/void /g,"fn "],
[/int /g,"let mut "],
[/float /g,"let mut "],
[/double /g,"let mut "],
[/char /g,"let mut "],
[/long /g,"let mut "],
[/short /g,"let mut "],
[/unsigned /g,"let mut "],
[/signed /g,"let mut "],
[/return 0;/g,""],
[/NULL/g,"None"],
[/malloc/g,"Box::new"],
[/free/g,"drop"],
[/strlen/g,"len"],
[/strcmp/g,"compare"],
[/strcpy/g,"copy"],
[/strcat/g,"append"],
[/->/g,"."],
[/struct /g,"struct "],
[/typedef /g,"type "],
[/for\s*\(/g,"for "],
[/while\s*\(/g,"while "],
[/do\s*\{/g,"loop {"],
[/switch/g,"match"],
[/case/g,"=>"],
[/break;/g,"break;"],
[/continue;/g,"continue;"],
[/exit/g,"std::process::exit"],
[/fopen/g,"File::open"],
[/fclose/g,"drop"],
[/fprintf/g,"println!"],
[/fscanf/g,"read_line"],
[/sizeof/g,"std::mem::size_of"],
[/time/g,"std::time"],
[/rand/g,"rand"],
[/srand/g,"seed"],
[/toupper/g,"to_uppercase"],
[/tolower/g,"to_lowercase"]

];

/* APPLY RULES */

rules.forEach(rule=>{
code = code.replace(rule[0],rule[1]);
});

/* EXTRA LOOP FOR MASS RULE EXPANSION */

for(let i=0;i<1000;i++){
code = code.replace(new RegExp("int"+i,"g"),"i32");
}

document.getElementById("outputCode").value = code;

}

</script>

</body>
</html>
