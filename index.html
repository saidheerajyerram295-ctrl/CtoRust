<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>C to Rust AI Converter | TechFest Demo</title>

<style>

body{
font-family: Arial, sans-serif;
background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
margin:0;
padding:0;
text-align:center;
}

header{
padding:40px;
font-size:32px;
font-weight:bold;
}

.container{
width:80%;
margin:auto;
}

textarea{
width:100%;
height:180px;
border-radius:8px;
border:none;
padding:15px;
font-size:16px;
margin-top:20px;
}

button{
background:#00c6ff;
background:linear-gradient(90deg,#00c6ff,#0072ff);
border:none;
padding:12px 30px;
color:white;
font-size:18px;
border-radius:8px;
cursor:pointer;
margin-top:20px;
}

button:hover{
opacity:0.9;
}

.output{
background:#111;
padding:20px;
margin-top:30px;
border-radius:8px;
text-align:left;
white-space:pre-wrap;
}

footer{
margin-top:40px;
padding:20px;
font-size:14px;
opacity:0.7;
}

</style>

</head>

<body>

<header>
🚀 AI C → Rust Code Converter
</header>

<div class="container">

<p>Paste C code below and convert it to Rust using AI.</p>

<textarea id="inputCode" placeholder="Example:
int add(int a,int b){
return a+b;
}"></textarea>

<br>

<button onclick="convert()">Convert to Rust</button>

<button onclick="openCompiler()">Open Online Compiler</button>

<div class="output" id="outputCode">
Rust code will appear here...
</div>

</div>

<footer>
TechFest Demo | AI Powered Code Migration | C → Rust
</footer>

<script>

function convert(){

let code=document.getElementById("inputCode").value;

if(code.trim()===""){
alert("Please enter C code first");
return;
}

document.getElementById("outputCode").innerText=
"Demo Mode:\n\nfn add(a:i32,b:i32)->i32{\n a+b\n}\n\n(For full conversion open the online converter button)";
}

function openCompiler(){
window.open("https://app.codeconvert.ai/code-converter?inputLang=C&outputLang=Rust");
}

</script>

</body>
</html>
