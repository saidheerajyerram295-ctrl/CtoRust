<!DOCTYPE html>
<html>
<head>
<title>CRust Converter</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#1e1e1e;
    color:white;
    text-align:center;
}

h1{
    color:#00ffcc;
}

.container{
    width:80%;
    margin:auto;
}

textarea{
    width:45%;
    height:250px;
    margin:10px;
    padding:10px;
    background:#2d2d2d;
    color:white;
    border:1px solid #555;
}

button{
    padding:12px 20px;
    background:#00ffcc;
    border:none;
    font-size:16px;
    cursor:pointer;
}
</style>
</head>

<body>

<h1>C → Rust Code Converter</h1>

<div class="container">

<textarea id="cCode" placeholder="Paste C code here"></textarea>

<textarea id="rustCode" placeholder="Rust output will appear here"></textarea>

<br>

<button onclick="convertCode()">Convert</button>

</div>

<script>
function convertCode(){

let code=document.getElementById("cCode").value;

let converted = code
.replace(/printf/g,"println!")
.replace(/int main/g,"fn main")
.replace(/;/g,";");

document.getElementById("rustCode").value = converted;

}
</script>

</body>
</html>
