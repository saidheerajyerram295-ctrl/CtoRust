<!DOCTYPE html>
<html>
<head>
<title>CRust AI Converter</title>

<style>
body{
background:#0f172a;
color:white;
font-family:Arial;
text-align:center;
}

.container{
width:90%;
margin:auto;
}

textarea{
width:45%;
height:350px;
background:#111827;
color:#00ffcc;
border:1px solid #333;
padding:10px;
font-family:monospace;
}

button{
padding:12px 20px;
background:#22c55e;
border:none;
font-size:16px;
cursor:pointer;
margin:10px;
}

h1{
color:#38bdf8;
}
</style>
</head>

<body>

<h1>CRust AI Converter</h1>
<p>C ↔ Rust Smart Code Translator</p>

<div class="container">

<textarea id="inputCode" placeholder="Paste C or Rust code here"></textarea>

<textarea id="outputCode" placeholder="Converted code appears here"></textarea>

<br>

<button onclick="convertToRust()">C → Rust</button>
<button onclick="convertToC()">Rust → C</button>
<button onclick="copyCode()">Copy Output</button>

</div>

<script>

function convertToRust(){

let code=document.getElementById("inputCode").value;

code=code.replace(/printf/g,"println!");
code=code.replace(/int main/g,"fn main");
code=code.replace(/#include <stdio.h>/g,"");

document.getElementById("outputCode").value=code;

}

function convertToC(){

let code=document.getElementById("inputCode").value;

code=code.replace(/println!/g,"printf");
code=code.replace(/fn main/g,"int main");

document.getElementById("outputCode").value=code;

}

function copyCode(){

let text=document.getElementById("outputCode");

text.select();
document.execCommand("copy");

alert("Code Copied!");

}

</script>

</body>
</html>
