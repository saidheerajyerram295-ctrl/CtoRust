<!DOCTYPE html>
<html>
<head>
<title>C to Rust AI Converter</title>
<style>
body {font-family: Arial; padding:40px;}
textarea {width:100%; height:150px;}
button {padding:10px 20px;}
pre {background:#f4f4f4; padding:20px;}
</style>
</head>

<body>

<h2>C → Rust Converter (AI Demo)</h2>

<textarea id="input" placeholder="Paste C code here"></textarea>
<br><br>

<button onclick="convert()">Convert to Rust</button>

<h3>Rust Output</h3>
<pre id="output"></pre>

<script>
async function convert(){

let code = document.getElementById("input").value;

let prompt = "Convert this C code to idiomatic Rust:\n" + code;

document.getElementById("output").innerText = "Generating...";

let response = await fetch("https://api.openai.com/v1/chat/completions",{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":"Bearer YOUR_API_KEY"
},
body:JSON.stringify({
model:"gpt-4o-mini",
messages:[{role:"user",content:prompt}]
})
});

let data = await response.json();

document.getElementById("output").innerText =
data.choices[0].message.content;
}
</script>

</body>
</html>
